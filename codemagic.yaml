workflows:
  ios-simulator-build:
    name: RelaxMarket iOS (simulator, no signing required)
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"
        BUNDLE_ID: "tj.relax"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: CPM
          include: true
    scripts:
      - name: Clean Xcode DerivedData (avoid a stale cached build plan/script)
        script: rm -rf ~/Library/Developer/Xcode/DerivedData
      - name: Build for iOS Simulator
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
      - name: Boot simulator, install app, and take a screenshot
        script: |
          set -e
          DEVICE_ID=$(xcrun simctl list devices available | grep -m1 'iPhone' | grep -oE '[0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12}')
          echo "Using simulator: $DEVICE_ID"
          xcrun simctl bootstatus "$DEVICE_ID" -b
          APP_PATH=$(find "$HOME/Library/Developer/Xcode/DerivedData" -name "iosApp.app" -path "*iphonesimulator*" | head -1)
          echo "App path: $APP_PATH"
          xcrun simctl install "$DEVICE_ID" "$APP_PATH"
          xcrun simctl launch "$DEVICE_ID" "$BUNDLE_ID"
          sleep 8
          mkdir -p "$CM_BUILD_DIR/screenshots"
          xcrun simctl io "$DEVICE_ID" screenshot "$CM_BUILD_DIR/screenshots/launch.png"
    artifacts:
      - screenshots/*.png
    publishing:
      email:
        recipients:
          - nasimisaodatsho@gmail.com
        notify:
          success: true
          failure: true

  ios-device-build:
    name: RelaxMarket iOS (device build)
    max_build_duration: 60
    instance_type: mac_mini_m2
    # Requires a Codemagic team integration named "relax-appstore" under
    # Team settings -> Integrations -> Apple Developer Portal (App Store Connect API key),
    # generated at https://appstoreconnect.apple.com/access/integrations/api. Codemagic uses
    # it to auto-create a development signing certificate + provisioning profile for the
    # devices registered on your Apple Developer account — no manual .p12/.mobileprovision
    # export needed. Rename "relax-appstore" below to whatever name you give the integration.
    integrations:
      app_store_connect: relax-appstore
    environment:
      xcode: latest
      ios_signing:
        distribution_type: development
        bundle_identifier: tj.relax
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: CPM
          include: true
    scripts:
      - name: Clean Xcode DerivedData (avoid a stale cached build plan/script)
        script: rm -rf ~/Library/Developer/Xcode/DerivedData
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          # The Xcode project's own "Compile Kotlin Framework" run-script build phase invokes
          # `./gradlew :app:embedAndSignAppleFrameworkForXcode` automatically as part of this —
          # no separate Gradle step needed here.
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - "/tmp/xcodebuild_logs/*.log"
    publishing:
      email:
        recipients:
          - nasimisaodatsho@gmail.com
        notify:
          success: true
          failure: true

# Before this builds an installable IPA you need to, once, in the Apple Developer portal
# (developer.apple.com/account/resources/devices) and Codemagic dashboard:
#   1. Register your iPhone's UDID as a development device on your Apple Developer account.
#      Easiest way to get the UDID: plug the iPhone into a Mac and check Finder, or use
#      https://codemagic.io/apps -> your app -> "iOS device registration" (Codemagic can host
#      a self-enrollment page that reads the UDID straight off the phone).
#   2. Create an App Store Connect API key (App Store Connect -> Users and Access ->
#      Integrations -> Keys) and add it in Codemagic under Team settings -> Integrations ->
#      Apple Developer Portal, naming the integration to match "app_store_connect:" above.
#   3. Re-run the workflow. `xcode-project use-profiles` will then fetch/generate a matching
#      development certificate + provisioning profile automatically — no manual signing files.
# Without step 1, the build will keep failing the same way even with signing configured,
# because a development profile can't be issued for a device Apple doesn't know about yet.
